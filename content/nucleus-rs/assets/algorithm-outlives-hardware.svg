<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="Inter, system-ui, sans-serif">
  <!-- the enduring algorithm -->
  <rect x="40" y="34" width="640" height="56" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="360" y="62" text-anchor="middle" font-size="18" font-weight="700" fill="#312e81">One algorithm</text>
  <text x="360" y="80" text-anchor="middle" font-size="12" fill="#4338ca">written once · long-lived</text>

  <!-- fan-out connectors -->
  <g stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="4 4" fill="none">
    <path d="M360 90 L110 150"/>
    <path d="M360 90 L270 150"/>
    <path d="M360 90 L430 150"/>
    <path d="M360 90 L590 150"/>
  </g>

  <!-- transient hardware -->
  <g font-size="13" fill="#374151" text-anchor="middle">
    <rect x="40"  y="150" width="140" height="50" rx="8" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="110" y="172" font-weight="600">CPU threads</text><text x="110" y="189" font-size="11" fill="#6b7280">yesterday</text>
    <rect x="200" y="150" width="140" height="50" rx="8" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="270" y="172" font-weight="600">MPI cluster</text><text x="270" y="189" font-size="11" fill="#6b7280">today</text>
    <rect x="360" y="150" width="140" height="50" rx="8" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="430" y="172" font-weight="600">microcontroller</text><text x="430" y="189" font-size="11" fill="#6b7280">today</text>
    <rect x="520" y="150" width="140" height="50" rx="8" fill="#fefce8" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="590" y="172" font-weight="600">next target</text><text x="590" y="189" font-size="11" fill="#6b7280">tomorrow</text>
  </g>

  <!-- time arrow -->
  <line x1="40" y1="250" x2="678" y2="250" stroke="#9ca3af" stroke-width="2"/>
  <path d="M678 250 l-10 -5 l0 10 z" fill="#9ca3af"/>
  <text x="360" y="278" text-anchor="middle" font-size="13" fill="#6b7280">hardware comes and goes — the algorithm outlives it</text>
</svg>
