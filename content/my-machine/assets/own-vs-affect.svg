<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 452" font-family="ui-sans-serif, system-ui, sans-serif">
  <!-- light panel so text reads on both light and dark themes -->
  <rect x="6" y="6" width="748" height="440" rx="16" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="380" y1="70" x2="380" y2="392" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- markers -->
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- LEFT: declarative, own -->
  <text x="196" y="44" text-anchor="middle" font-size="19" font-weight="700" fill="#3a6ea5">Declarative: you own it</text>

  <rect x="66" y="72" width="260" height="56" rx="10" fill="#eef2ff" stroke="#3a6ea5" stroke-width="1.5"/>
  <text x="196" y="97" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2937">config.nix</text>
  <text x="196" y="116" text-anchor="middle" font-size="13" fill="#4b5563">tracked in git</text>

  <line x1="196" y1="128" x2="196" y2="164" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="206" y="151" font-size="13" fill="#4b5563">nix build</text>

  <!-- stacked generations -->
  <rect x="86" y="196" width="220" height="52" rx="10" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.25"/>
  <rect x="76" y="186" width="220" height="52" rx="10" fill="#eef2ff" stroke="#3a6ea5" stroke-width="1.5"/>
  <text x="186" y="217" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2937">generation N</text>
  <text x="186" y="234" text-anchor="middle" font-size="12.5" fill="#4b5563">old gens kept, shared on disk</text>

  <text x="196" y="292" text-anchor="middle" font-size="14" font-weight="600" fill="#3a6ea5">&#8617; roll back at boot</text>

  <!-- RIGHT: convergent, affect -->
  <text x="566" y="44" text-anchor="middle" font-size="19" font-weight="700" fill="#d97757">Convergent: you only affect it</text>

  <rect x="436" y="72" width="260" height="56" rx="10" fill="#fffbeb" stroke="#d97757" stroke-width="1.5"/>
  <text x="566" y="97" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2937">playbook.yml</text>
  <text x="566" y="116" text-anchor="middle" font-size="13" fill="#4b5563">declares desired state</text>

  <line x1="566" y1="128" x2="566" y2="164" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="576" y="151" font-size="13" fill="#4b5563">run: mutate in place</text>

  <rect x="446" y="186" width="240" height="52" rx="10" fill="#fffbeb" stroke="#d97757" stroke-width="1.5"/>
  <text x="566" y="207" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2937">live system + drift</text>
  <text x="566" y="224" text-anchor="middle" font-size="12.5" fill="#4b5563">leftover mutations stay behind</text>
  <!-- drift blobs -->
  <circle cx="470" cy="258" r="5" fill="#d97757" opacity="0.55"/>
  <circle cx="500" cy="266" r="4" fill="#d97757" opacity="0.45"/>
  <circle cx="640" cy="260" r="6" fill="#d97757" opacity="0.5"/>
  <circle cx="612" cy="268" r="4" fill="#d97757" opacity="0.4"/>

  <text x="566" y="292" text-anchor="middle" font-size="14" font-weight="600" fill="#d97757">&#10007; no atomic rollback</text>

  <!-- bottom caption -->
  <line x1="60" y1="330" x2="700" y2="330" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="380" y="362" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2937">Same intent, two engines.</text>
  <text x="380" y="386" text-anchor="middle" font-size="14" fill="#4b5563">One rebuilds the machine from text; the other mutates the machine you have.</text>
</svg>
