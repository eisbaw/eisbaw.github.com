<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges" role="img" aria-label="Animated pixel CRT terminal with a blinking cursor, a scanline, and a power light">
  <!-- monitor bezel -->
  <rect x="2" y="2" width="12" height="9" fill="#3a6ea5"/>
  <!-- screen -->
  <rect x="3" y="3" width="10" height="7" fill="#16263a"/>

  <!-- scanline sweeping down the screen -->
  <rect x="3" y="3" width="10" height="1" fill="#ffffff" opacity="0.14">
    <animate attributeName="y" values="3;5;7;9;3" keyTimes="0;0.25;0.5;0.75;1"
             dur="3.2s" calcMode="discrete" repeatCount="indefinite"/>
  </rect>

  <!-- prompt line: clay caret, blinking cursor -->
  <rect x="4" y="4" width="1" height="1" fill="#d97757"/>
  <rect x="6" y="4" width="1" height="1" fill="#a9c7e8">
    <animate attributeName="fill" values="#a9c7e8;#16263a" keyTimes="0;0.5"
             dur="1s" calcMode="discrete" repeatCount="indefinite"/>
  </rect>
  <!-- output lines -->
  <rect x="4" y="6" width="5" height="1" fill="#a9c7e8"/>
  <rect x="4" y="8" width="3" height="1" fill="#5a8dc2"/>

  <!-- power LED, slow pulse -->
  <rect x="12" y="10" width="1" height="1" fill="#d97757">
    <animate attributeName="opacity" values="1;0.25;1" keyTimes="0;0.5;1"
             dur="2.2s" calcMode="discrete" repeatCount="indefinite"/>
  </rect>

  <!-- neck + base -->
  <rect x="7" y="11" width="2" height="1" fill="#3a6ea5"/>
  <rect x="4" y="12" width="8" height="1" fill="#3a6ea5"/>
</svg>
