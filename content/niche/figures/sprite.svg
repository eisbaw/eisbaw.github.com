<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- 8-bit gear: the niche build engine. Steppy quarter-turn rotation (SMIL, no JS). -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="0 80 80;90 80 80;180 80 80;270 80 80;360 80 80"
      keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete"
      dur="4s" repeatCount="indefinite"/>

    <!-- gear body + teeth (windows-2000 blue) -->
    <rect x="60" y="0" width="20" height="20" fill="#3a6ea5"/>
    <rect x="80" y="0" width="20" height="20" fill="#3a6ea5"/>
    <rect x="60" y="20" width="20" height="20" fill="#3a6ea5"/>
    <rect x="80" y="20" width="20" height="20" fill="#3a6ea5"/>
    <rect x="100" y="20" width="20" height="20" fill="#3a6ea5"/>
    <rect x="40" y="40" width="20" height="20" fill="#3a6ea5"/>
    <rect x="60" y="40" width="20" height="20" fill="#3a6ea5"/>
    <rect x="80" y="40" width="20" height="20" fill="#3a6ea5"/>
    <rect x="100" y="40" width="20" height="20" fill="#3a6ea5"/>
    <rect x="120" y="40" width="20" height="20" fill="#3a6ea5"/>
    <rect x="0" y="60" width="20" height="20" fill="#3a6ea5"/>
    <rect x="20" y="60" width="20" height="20" fill="#3a6ea5"/>
    <rect x="40" y="60" width="20" height="20" fill="#3a6ea5"/>
    <rect x="100" y="60" width="20" height="20" fill="#3a6ea5"/>
    <rect x="120" y="60" width="20" height="20" fill="#3a6ea5"/>
    <rect x="140" y="60" width="20" height="20" fill="#3a6ea5"/>
    <rect x="0" y="80" width="20" height="20" fill="#3a6ea5"/>
    <rect x="20" y="80" width="20" height="20" fill="#3a6ea5"/>
    <rect x="40" y="80" width="20" height="20" fill="#3a6ea5"/>
    <rect x="100" y="80" width="20" height="20" fill="#3a6ea5"/>
    <rect x="120" y="80" width="20" height="20" fill="#3a6ea5"/>
    <rect x="140" y="80" width="20" height="20" fill="#3a6ea5"/>
    <rect x="20" y="100" width="20" height="20" fill="#3a6ea5"/>
    <rect x="40" y="100" width="20" height="20" fill="#3a6ea5"/>
    <rect x="60" y="100" width="20" height="20" fill="#3a6ea5"/>
    <rect x="80" y="100" width="20" height="20" fill="#3a6ea5"/>
    <rect x="100" y="100" width="20" height="20" fill="#3a6ea5"/>
    <rect x="120" y="100" width="20" height="20" fill="#3a6ea5"/>
    <rect x="40" y="120" width="20" height="20" fill="#3a6ea5"/>
    <rect x="60" y="120" width="20" height="20" fill="#3a6ea5"/>
    <rect x="80" y="120" width="20" height="20" fill="#3a6ea5"/>
    <rect x="100" y="120" width="20" height="20" fill="#3a6ea5"/>
    <rect x="60" y="140" width="20" height="20" fill="#3a6ea5"/>
    <rect x="80" y="140" width="20" height="20" fill="#3a6ea5"/>

    <!-- top-left sheen (light blue) -->
    <rect x="40" y="20" width="20" height="20" fill="#9fbcda"/>
    <rect x="20" y="40" width="20" height="20" fill="#9fbcda"/>

    <!-- clay hub -->
    <rect x="60" y="60" width="20" height="20" fill="#d97757"/>
    <rect x="80" y="60" width="20" height="20" fill="#d97757"/>
    <rect x="60" y="80" width="20" height="20" fill="#d97757"/>
    <rect x="80" y="80" width="20" height="20" fill="#d97757"/>
  </g>
</svg>
