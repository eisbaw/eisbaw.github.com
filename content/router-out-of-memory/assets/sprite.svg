<rect x="146" y="196" width="20" height="20" fill="#9fbcda"><animate attributeName="opacity" values="1;1;0.12;1" keyTimes="0;0.36;0.38;0.85" dur="4s" calcMode="discrete" repeatCount="indefinite"/></rect>
