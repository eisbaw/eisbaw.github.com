<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Pre-fix failure, guarded integrated-candidate validation, and persisted module spot check</title>
  <desc id="desc">Three panels compare exact endpoints. A committed 240.1-second pre-fix capture loses 25,772 KiB of available memory while page-frag backing grows by 29,229,056 bytes. The integrated candidate stays bounded during a 1,790-second gate and a second 289-second load, both with zero memguard events. A timestamped spot check after 32,993 seconds of uptime remains healthy with 157,728 KiB available and 81,494,016 page-frag bytes.</desc>
  <defs>
    <marker id="arrow-red" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9Z" fill="#9e3937"/>
    </marker>
    <marker id="arrow-teal" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9Z" fill="#08766f"/>
    </marker>
    <style>
      .bg { fill: #fffdf8; }
      .panel { fill: #ffffff; stroke: #c8cec9; stroke-width: 2; }
      .panel.bad { fill: #fff8f6; stroke: #e2aaa7; }
      .panel.good { fill: #f4fbf8; stroke: #90c9c3; }
      .eyebrow { font: 800 14px ui-monospace, monospace; letter-spacing: .07em; }
      .eyebrow.bad { fill: #9e3937; }
      .eyebrow.good { fill: #08766f; }
      .head { fill: #123b52; font: 700 25px system-ui, sans-serif; }
      .sub { fill: #52626d; font: 500 15px system-ui, sans-serif; }
      .label { fill: #344853; font: 650 16px system-ui, sans-serif; }
      .value { fill: #17242d; font: 750 25px ui-monospace, monospace; }
      .unit { fill: #52626d; font: 500 13px system-ui, sans-serif; }
      .delta-bad { fill: #9e3937; font: 750 16px ui-monospace, monospace; }
      .delta-good { fill: #08766f; font: 750 16px ui-monospace, monospace; }
      .arrow-bad { stroke: #9e3937; stroke-width: 2.5; marker-end: url(#arrow-red); }
      .arrow-good { stroke: #08766f; stroke-width: 2.5; marker-end: url(#arrow-teal); }
      .metric-box { fill: #fff; stroke: #ccd2d0; stroke-width: 1.4; }
      .rule { stroke: #d9d9d2; stroke-width: 1; }
      .badge { fill: #dcefeb; stroke: #90c9c3; stroke-width: 1.2; }
      .badge-text { fill: #075f59; font: 750 15px system-ui, sans-serif; }
      .foot { fill: #52626d; font: 500 14px system-ui, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="650" rx="18"/>

  <rect class="panel bad" x="24" y="24" width="354" height="572" rx="16"/>
  <text class="eyebrow bad" x="50" y="58">PRE-FIX · CAPTURED</text>
  <text class="head" x="50" y="94">Failure window</text>
  <text class="sub" x="50" y="121">240.1 seconds under natural load</text>

  <text class="label" x="50" y="165">MemAvailable</text>
  <rect class="metric-box" x="50" y="181" width="132" height="74" rx="9"/>
  <text class="value" x="116" y="218" text-anchor="middle">46,768</text>
  <text class="unit" x="116" y="240" text-anchor="middle">KiB</text>
  <line class="arrow-bad" x1="190" y1="218" x2="232" y2="218"/>
  <rect class="metric-box" x="240" y="181" width="112" height="74" rx="9"/>
  <text class="value" x="296" y="218" text-anchor="middle">20,996</text>
  <text class="unit" x="296" y="240" text-anchor="middle">KiB</text>
  <text class="delta-bad" x="50" y="281">Δ −25,772 KiB</text>

  <line class="rule" x1="50" y1="307" x2="352" y2="307"/>

  <text class="label" x="50" y="344">Page-frag backing</text>
  <rect class="metric-box" x="50" y="360" width="132" height="74" rx="9"/>
  <text class="value" x="116" y="397" text-anchor="middle">158.83M</text>
  <text class="unit" x="116" y="419" text-anchor="middle">bytes</text>
  <line class="arrow-bad" x1="190" y1="397" x2="232" y2="397"/>
  <rect class="metric-box" x="240" y="360" width="112" height="74" rx="9"/>
  <text class="value" x="296" y="397" text-anchor="middle">188.06M</text>
  <text class="unit" x="296" y="419" text-anchor="middle">bytes</text>
  <text class="delta-bad" x="50" y="460">Δ +29,229,056 B</text>

  <text class="sub" x="50" y="507">Committed fresh-capture evidence;</text>
  <text class="sub" x="50" y="529">no lost events; probes cleaned.</text>
  <text class="delta-bad" x="50" y="564">Backing growth tracked memory loss</text>

  <rect class="panel good" x="402" y="24" width="478" height="572" rx="16"/>
  <text class="eyebrow good" x="428" y="58">INTEGRATED CANDIDATE · A/B</text>
  <text class="head" x="428" y="94">Bounded validation</text>
  <text class="sub" x="428" y="121">168 samples · 1,790 seconds</text>

  <text class="label" x="428" y="165">MemAvailable</text>
  <rect class="metric-box" x="428" y="181" width="150" height="74" rx="9"/>
  <text class="value" x="503" y="218" text-anchor="middle">156,464</text>
  <text class="unit" x="503" y="240" text-anchor="middle">KiB</text>
  <line class="arrow-good" x1="590" y1="218" x2="638" y2="218"/>
  <rect class="metric-box" x="648" y="181" width="150" height="74" rx="9"/>
  <text class="value" x="723" y="218" text-anchor="middle">159,748</text>
  <text class="unit" x="723" y="240" text-anchor="middle">KiB</text>
  <text class="delta-good" x="428" y="281">range 8,704 KiB · OLS −51.9 KiB/min</text>

  <line class="rule" x1="428" y1="307" x2="854" y2="307"/>

  <text class="label" x="428" y="344">Page-frag backing</text>
  <rect class="metric-box" x="428" y="360" width="150" height="74" rx="9"/>
  <text class="value" x="503" y="397" text-anchor="middle">82.739M</text>
  <text class="unit" x="503" y="419" text-anchor="middle">bytes</text>
  <line class="arrow-good" x1="590" y1="397" x2="638" y2="397"/>
  <rect class="metric-box" x="648" y="360" width="150" height="74" rx="9"/>
  <text class="value" x="723" y="397" text-anchor="middle">82.706M</text>
  <text class="unit" x="723" y="419" text-anchor="middle">bytes</text>
  <text class="delta-good" x="428" y="460">range 2,162,688 B · OLS +9,062 B/min</text>

  <rect class="badge" x="428" y="492" width="426" height="68" rx="12"/>
  <text class="badge-text" x="641" y="520" text-anchor="middle">Second transient load also passed</text>
  <text class="sub" x="641" y="544" text-anchor="middle">289 s · bounded ranges · zero memguard events</text>

  <rect class="panel good" x="904" y="24" width="272" height="572" rx="16"/>
  <text class="eyebrow good" x="930" y="58">PERSISTED · SPOT CHECK</text>
  <text class="head" x="930" y="94">Still healthy</text>
  <text class="sub" x="930" y="121">2026-07-13 09:06:50 UTC</text>

  <text class="label" x="930" y="168">Router uptime</text>
  <text class="value" x="930" y="204">32,993 s</text>
  <text class="unit" x="930" y="226">9 h 9 min</text>

  <line class="rule" x1="930" y1="252" x2="1150" y2="252"/>
  <text class="label" x="930" y="285">MemAvailable</text>
  <text class="value" x="930" y="320">157,728 KiB</text>

  <text class="label" x="930" y="365">Page-frag backing</text>
  <text class="value" x="930" y="400">81,494,016 B</text>

  <text class="label" x="930" y="445">Memguard reloads</text>
  <text class="value" x="930" y="480">0</text>

  <rect class="badge" x="930" y="510" width="220" height="50" rx="25"/>
  <text class="badge-text" x="1040" y="541" text-anchor="middle">private_rxfrag = Y</text>

  <text class="foot" x="600" y="626" text-anchor="middle">Exact endpoints are shown; no intermediate samples are interpolated in this graphic.</text>
</svg>
