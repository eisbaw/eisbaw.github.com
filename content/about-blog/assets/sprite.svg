<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges" role="img" aria-label="Animated pixel diagram of two linked repositories, instance and engine, with a pulse passing between them">
  <!-- left repo (instance): content -->
  <rect x="1" y="5" width="6" height="6" fill="#3a6ea5"/>
  <rect x="2" y="6" width="4" height="4" fill="#f0d9b5"/>
  <rect x="3" y="7" width="2" height="1" fill="#3a6ea5"/>
  <rect x="3" y="8" width="3" height="1" fill="#3a6ea5"/>

  <!-- right repo (engine): gear-ish core -->
  <rect x="9" y="5" width="6" height="6" fill="#3a6ea5"/>
  <rect x="10" y="6" width="4" height="4" fill="#cfe0f2"/>
  <rect x="11" y="7" width="2" height="2" fill="#d97757"/>

  <!-- link between the two repos -->
  <rect x="7" y="8" width="2" height="1" fill="#8fb4d6"/>

  <!-- pulse travelling the link, back and forth -->
  <rect y="8" width="1" height="1" fill="#d97757">
    <animate attributeName="x" calcMode="discrete" dur="1.8s" repeatCount="indefinite"
             keyTimes="0;0.25;0.5;0.75;1" values="7;8;9;8;7"/>
  </rect>
</svg>
