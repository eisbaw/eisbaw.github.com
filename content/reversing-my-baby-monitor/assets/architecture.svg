<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 480" width="840" height="480" font-family="Inter, system-ui, sans-serif" role="img" aria-label="How the baby monitor client talks to the camera through Tuya's cloud">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- light panel so all text reads on both light and dark themes -->
  <rect x="2" y="2" width="836" height="476" rx="14" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- cloud container -->
  <rect x="280" y="40" width="290" height="300" rx="12" fill="#ffffff" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="425" y="64" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1715">Tuya cloud</text>
  <text x="425" y="328" text-anchor="middle" font-size="12" fill="#6b7280">brokers every session setup</text>

  <!-- login / auth box -->
  <rect x="300" y="78" width="250" height="86" rx="10" fill="#fffbeb" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="425" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1715">Login + request signing</text>
  <text x="425" y="134" text-anchor="middle" font-size="12.5" fill="#374151">issues a session token (sid)</text>

  <!-- mqtt box -->
  <rect x="300" y="196" width="250" height="86" rx="10" fill="#ecfdf5" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="425" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1715">MQTT broker</text>
  <text x="425" y="252" text-anchor="middle" font-size="12.5" fill="#374151">relays the signaling handshake</text>

  <!-- client box -->
  <rect x="30" y="158" width="170" height="112" rx="12" fill="#eef2ff" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="115" y="206" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1715">My Linux client</text>
  <text x="115" y="228" text-anchor="middle" font-size="12" fill="#374151">replaces the phone app</text>

  <!-- camera box -->
  <rect x="640" y="158" width="170" height="112" rx="12" fill="#eef2ff" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="725" y="198" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1715">Camera</text>
  <text x="725" y="220" text-anchor="middle" font-size="12" fill="#374151">Philips Avent</text>
  <text x="725" y="238" text-anchor="middle" font-size="12" fill="#374151">= Tuya IPC</text>

  <!-- 1: client -> login -->
  <line x1="200" y1="180" x2="298" y2="118" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="206" y="150" font-size="12" fill="#1a1715">1  log in (signed)</text>

  <!-- 1 return: login -> client -->
  <line x1="298" y1="150" x2="202" y2="206" stroke="#6b7280" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="206" y="184" font-size="11" fill="#374151">sid, localKey, keys, ICE</text>

  <!-- 2: client -> mqtt -->
  <line x1="200" y1="240" x2="298" y2="240" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="214" y="234" font-size="12" fill="#1a1715">2  connect</text>

  <!-- 3: mqtt <-> camera -->
  <line x1="550" y1="239" x2="638" y2="210" stroke="#6b7280" stroke-width="1.8" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="556" y="198" font-size="12" fill="#1a1715">3  offer / answer</text>
  <text x="556" y="214" font-size="11" fill="#374151">sealed with localKey</text>

  <!-- 4: direct media path -->
  <path d="M115,270 L115,420 L725,420 L725,270" fill="none" stroke="#6b7280" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="420" y="410" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1715">4  direct, device to device</text>
  <text x="420" y="438" text-anchor="middle" font-size="12" fill="#374151">ICE picks a path, then H.264 over a custom encrypted UDP transport. Works on the LAN, or over a VPN.</text>

  <!-- auth footnote -->
  <text x="420" y="463" text-anchor="middle" font-size="11" fill="#6b7280">The session token gates everything. localKey seals the signaling. The media stream carries its own per-session key.</text>
</svg>
