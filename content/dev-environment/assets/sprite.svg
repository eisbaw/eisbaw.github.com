<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges" role="img" aria-label="Animated pixel Nix snowflake with a clay sparkle chasing around its arms">
  <!-- hub -->
  <rect x="8" y="8" width="1" height="1" fill="#3a6ea5"/>
  <rect x="7" y="8" width="1" height="1" fill="#5a8dc2"/>
  <rect x="9" y="8" width="1" height="1" fill="#5a8dc2"/>
  <rect x="8" y="7" width="1" height="1" fill="#5a8dc2"/>
  <rect x="8" y="9" width="1" height="1" fill="#5a8dc2"/>

  <!-- vertical arm -->
  <rect x="8" y="6" width="1" height="1" fill="#5a8dc2"/>
  <rect x="8" y="5" width="1" height="1" fill="#3a6ea5"/>
  <rect x="8" y="4" width="1" height="1" fill="#3a6ea5"/>
  <rect x="8" y="3" width="1" height="1" fill="#3a6ea5"/>
  <rect x="8" y="10" width="1" height="1" fill="#5a8dc2"/>
  <rect x="8" y="11" width="1" height="1" fill="#3a6ea5"/>
  <rect x="8" y="12" width="1" height="1" fill="#3a6ea5"/>
  <rect x="8" y="13" width="1" height="1" fill="#3a6ea5"/>

  <!-- horizontal arm -->
  <rect x="6" y="8" width="1" height="1" fill="#5a8dc2"/>
  <rect x="5" y="8" width="1" height="1" fill="#3a6ea5"/>
  <rect x="4" y="8" width="1" height="1" fill="#3a6ea5"/>
  <rect x="3" y="8" width="1" height="1" fill="#3a6ea5"/>
  <rect x="10" y="8" width="1" height="1" fill="#5a8dc2"/>
  <rect x="11" y="8" width="1" height="1" fill="#3a6ea5"/>
  <rect x="12" y="8" width="1" height="1" fill="#3a6ea5"/>
  <rect x="13" y="8" width="1" height="1" fill="#3a6ea5"/>

  <!-- diagonal arms -->
  <rect x="7" y="7" width="1" height="1" fill="#5a8dc2"/>
  <rect x="6" y="6" width="1" height="1" fill="#3a6ea5"/>
  <rect x="5" y="5" width="1" height="1" fill="#3a6ea5"/>
  <rect x="9" y="7" width="1" height="1" fill="#5a8dc2"/>
  <rect x="10" y="6" width="1" height="1" fill="#3a6ea5"/>
  <rect x="11" y="5" width="1" height="1" fill="#3a6ea5"/>
  <rect x="7" y="9" width="1" height="1" fill="#5a8dc2"/>
  <rect x="6" y="10" width="1" height="1" fill="#3a6ea5"/>
  <rect x="5" y="11" width="1" height="1" fill="#3a6ea5"/>
  <rect x="9" y="9" width="1" height="1" fill="#5a8dc2"/>
  <rect x="10" y="10" width="1" height="1" fill="#3a6ea5"/>
  <rect x="11" y="11" width="1" height="1" fill="#3a6ea5"/>

  <!-- snowflake branch pixels (light-blue) -->
  <rect x="7" y="4" width="1" height="1" fill="#8fb4d6"/>
  <rect x="9" y="4" width="1" height="1" fill="#8fb4d6"/>
  <rect x="7" y="12" width="1" height="1" fill="#8fb4d6"/>
  <rect x="9" y="12" width="1" height="1" fill="#8fb4d6"/>
  <rect x="4" y="7" width="1" height="1" fill="#8fb4d6"/>
  <rect x="4" y="9" width="1" height="1" fill="#8fb4d6"/>
  <rect x="12" y="7" width="1" height="1" fill="#8fb4d6"/>
  <rect x="12" y="9" width="1" height="1" fill="#8fb4d6"/>

  <!-- 8 arm tips: clay sparkle chases around, one lit per step -->
  <rect x="8" y="2" width="1" height="1" fill="#3a6ea5">
    <animate attributeName="fill" calcMode="discrete" dur="2.4s" repeatCount="indefinite"
             keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
             values="#d97757;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#d97757"/>
  </rect>
  <rect x="12" y="4" width="1" height="1" fill="#3a6ea5">
    <animate attributeName="fill" calcMode="discrete" dur="2.4s" repeatCount="indefinite"
             keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
             values="#3a6ea5;#d97757;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5"/>
  </rect>
  <rect x="14" y="8" width="1" height="1" fill="#3a6ea5">
    <animate attributeName="fill" calcMode="discrete" dur="2.4s" repeatCount="indefinite"
             keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
             values="#3a6ea5;#3a6ea5;#d97757;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5"/>
  </rect>
  <rect x="12" y="12" width="1" height="1" fill="#3a6ea5">
    <animate attributeName="fill" calcMode="discrete" dur="2.4s" repeatCount="indefinite"
             keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
             values="#3a6ea5;#3a6ea5;#3a6ea5;#d97757;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5"/>
  </rect>
  <rect x="8" y="14" width="1" height="1" fill="#3a6ea5">
    <animate attributeName="fill" calcMode="discrete" dur="2.4s" repeatCount="indefinite"
             keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
             values="#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#d97757;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5"/>
  </rect>
  <rect x="4" y="12" width="1" height="1" fill="#3a6ea5">
    <animate attributeName="fill" calcMode="discrete" dur="2.4s" repeatCount="indefinite"
             keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
             values="#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#d97757;#3a6ea5;#3a6ea5;#3a6ea5"/>
  </rect>
  <rect x="2" y="8" width="1" height="1" fill="#3a6ea5">
    <animate attributeName="fill" calcMode="discrete" dur="2.4s" repeatCount="indefinite"
             keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
             values="#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#d97757;#3a6ea5;#3a6ea5"/>
  </rect>
  <rect x="4" y="4" width="1" height="1" fill="#3a6ea5">
    <animate attributeName="fill" calcMode="discrete" dur="2.4s" repeatCount="indefinite"
             keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
             values="#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#3a6ea5;#d97757;#3a6ea5"/>
  </rect>
</svg>
