<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 660" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect x="6" y="6" width="788" height="648" rx="16" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5"/>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="30" y="38" font-size="16" font-weight="700" fill="#1f2937">Many repositories, one workflow</text>

  <!-- USER actor -->
  <circle cx="66" cy="176" r="13" fill="#3a6ea5"/>
  <rect x="52" y="192" width="28" height="28" rx="9" fill="#3a6ea5"/>
  <text x="66" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">me</text>

  <!-- swimlanes: each has an agent + a repo (just + nix) -->
  <!-- lane 1 -->
  <rect x="150" y="62" width="470" height="82" rx="10" fill="#eef2ff" stroke="#9ca3af" stroke-width="1.25"/>
  <text x="162" y="80" font-size="11" fill="#6b7280">project A</text>
  <!-- agent robot -->
  <line x1="196" y1="88" x2="196" y2="96" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="196" cy="86" r="2.5" fill="#3a6ea5"/>
  <rect x="180" y="96" width="34" height="28" rx="5" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.25"/>
  <circle cx="189" cy="110" r="2.6" fill="#3a6ea5"/>
  <circle cx="205" cy="110" r="2.6" fill="#3a6ea5"/>
  <text x="197" y="138" text-anchor="middle" font-size="10.5" fill="#4b5563">agent</text>
  <!-- repo -->
  <text x="300" y="82" font-size="11" fill="#6b7280">repo</text>
  <rect x="298" y="88" width="150" height="42" rx="6" fill="#ffffff" stroke="#3a6ea5" stroke-width="1.5"/>
  <rect x="308" y="98" width="52" height="22" rx="3" fill="#3a6ea5"/>
  <text x="334" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">just</text>
  <rect x="370" y="98" width="66" height="22" rx="3" fill="#d97757"/>
  <text x="403" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">.nix</text>
  <line x1="448" y1="103" x2="642" y2="150" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- lane 2 -->
  <rect x="150" y="158" width="470" height="82" rx="10" fill="#fff7ed" stroke="#9ca3af" stroke-width="1.25"/>
  <text x="162" y="176" font-size="11" fill="#6b7280">project B</text>
  <line x1="196" y1="184" x2="196" y2="192" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="196" cy="182" r="2.5" fill="#3a6ea5"/>
  <rect x="180" y="192" width="34" height="28" rx="5" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.25"/>
  <circle cx="189" cy="206" r="2.6" fill="#3a6ea5"/>
  <circle cx="205" cy="206" r="2.6" fill="#3a6ea5"/>
  <text x="197" y="234" text-anchor="middle" font-size="10.5" fill="#4b5563">agent</text>
  <text x="300" y="178" font-size="11" fill="#6b7280">repo</text>
  <rect x="298" y="184" width="150" height="42" rx="6" fill="#ffffff" stroke="#3a6ea5" stroke-width="1.5"/>
  <rect x="308" y="194" width="52" height="22" rx="3" fill="#3a6ea5"/>
  <text x="334" y="209" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">just</text>
  <rect x="370" y="194" width="66" height="22" rx="3" fill="#d97757"/>
  <text x="403" y="209" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">.nix</text>
  <line x1="448" y1="205" x2="642" y2="200" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- lane 3 (this one is "my machine") -->
  <rect x="150" y="254" width="470" height="82" rx="10" fill="#eef2ff" stroke="#9ca3af" stroke-width="1.25"/>
  <text x="162" y="272" font-size="11" fill="#6b7280">project C</text>
  <line x1="196" y1="280" x2="196" y2="288" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="196" cy="278" r="2.5" fill="#3a6ea5"/>
  <rect x="180" y="288" width="34" height="28" rx="5" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.25"/>
  <circle cx="189" cy="302" r="2.6" fill="#3a6ea5"/>
  <circle cx="205" cy="302" r="2.6" fill="#3a6ea5"/>
  <text x="197" y="330" text-anchor="middle" font-size="10.5" fill="#4b5563">agent</text>
  <text x="300" y="274" font-size="11" fill="#6b7280">repo</text>
  <rect x="298" y="280" width="150" height="42" rx="6" fill="#ffffff" stroke="#d97757" stroke-width="2"/>
  <rect x="308" y="290" width="52" height="22" rx="3" fill="#3a6ea5"/>
  <text x="334" y="305" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">just</text>
  <rect x="370" y="290" width="66" height="22" rx="3" fill="#d97757"/>
  <text x="403" y="305" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">.nix</text>
  <line x1="448" y1="301" x2="642" y2="250" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- CI collector -->
  <rect x="648" y="140" width="120" height="120" rx="12" fill="#eef2ff" stroke="#3a6ea5" stroke-width="1.5"/>
  <circle cx="708" cy="182" r="17" fill="none" stroke="#3a6ea5" stroke-width="3"/>
  <circle cx="708" cy="182" r="5" fill="#3a6ea5"/>
  <g fill="#3a6ea5">
    <rect x="705" y="160" width="6" height="7"/><rect x="705" y="197" width="6" height="7"/>
    <rect x="686" y="179" width="7" height="6"/><rect x="723" y="179" width="7" height="6"/>
    <rect x="692" y="165" width="6" height="6"/><rect x="718" y="165" width="6" height="6"/>
    <rect x="692" y="196" width="6" height="6"/><rect x="718" y="196" width="6" height="6"/>
  </g>
  <text x="708" y="228" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">CI</text>
  <text x="708" y="246" text-anchor="middle" font-size="10.5" fill="#4b5563">self-hosted GitLab</text>
  <text x="708" y="128" text-anchor="middle" font-size="10.5" fill="#6b7280">calls just recipes</text>

  <!-- divider -->
  <line x1="30" y1="392" x2="770" y2="392" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="30" y="422" font-size="16" font-weight="700" fill="#1f2937">One of those repos is my machine</text>

  <!-- the stack: zellij over NixOS over Linux -->
  <rect x="200" y="452" width="230" height="46" rx="7" fill="#fff7ed" stroke="#d97757" stroke-width="1.5"/>
  <text x="315" y="474" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">zellij</text>
  <text x="315" y="490" text-anchor="middle" font-size="11" fill="#4b5563">terminal multiplexer</text>
  <rect x="200" y="504" width="230" height="46" rx="7" fill="#eef2ff" stroke="#3a6ea5" stroke-width="1.5"/>
  <text x="315" y="526" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">NixOS</text>
  <text x="315" y="542" text-anchor="middle" font-size="11" fill="#4b5563">the machine, declared</text>
  <rect x="200" y="556" width="230" height="46" rx="7" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="315" y="578" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">Linux</text>
  <text x="315" y="594" text-anchor="middle" font-size="11" fill="#4b5563">kernel + drivers</text>

  <!-- curly brace around the whole stack, tip pointing right -->
  <path d="M446,452 C456,452 456,519 462,527 C456,535 456,602 446,602"
        fill="none" stroke="#d97757" stroke-width="2"/>
  <!-- connector from brace up to lane-3 repo, labelled My machine -->
  <path d="M463,527 C520,520 500,360 452,315" fill="none" stroke="#d97757" stroke-width="1.75"
        stroke-dasharray="5 4" marker-end="url(#a)"/>
  <text x="500" y="452" font-size="13.5" font-weight="700" fill="#d97757">My machine</text>
  <text x="500" y="470" font-size="11" fill="#6b7280">is a repo too</text>
</svg>
