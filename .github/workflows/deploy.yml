name: Build (Nix) and deploy to GitHub Pages

# Deployment ONLY. Not triggered by pull_request, so a PR can never reach a
# deploy-capable job. PR validation lives in ci.yml. Deploys happen on push to
# master or a manual dispatch. Recommend also setting a deployment-branch rule
# on the github-pages environment (master only) so workflow_dispatch from an
# arbitrary branch cannot publish it.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# One production deployment at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix (flakes enabled)
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          # Install plain upstream Nix; skip Determinate Nix + FlakeHub login.
          determinate: false

      - name: Build and test the complete site
        run: nix develop --command just e2e

      - name: Stage artifact (dereference the /nix/store symlink)
        run: |
          mkdir -p public
          cp -rL result/. public/
          ls -la public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
