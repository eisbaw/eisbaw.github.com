name: CI (build + test)

# Pull-request validation ONLY. This workflow has no deployment capability by
# construction: it is not triggered by push, requests no pages/id-token
# permissions, and defines no deploy job. A PR therefore cannot reach any
# step that could publish the site. Deployment lives solely in deploy.yml,
# which is not triggered by pull_request.
on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix (flakes enabled)
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          # Install plain upstream Nix; skip Determinate Nix + FlakeHub login.
          determinate: false

      - name: Build and test the complete site
        run: nix develop --command just e2e
